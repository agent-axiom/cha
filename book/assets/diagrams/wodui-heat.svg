  <g id="process-stages">
    <g data-encoding="shape+label" data-meaning="увлажнение запускает влажную среду" data-shape="water-drop">
      <path d="M158 866 C128 908 129 940 158 950 C187 940 188 908 158 866 Z" fill="#253C32" stroke="#211A16" stroke-width="2" data-stroke-width-mm="0.25"/>
      <text x="158" y="990" text-anchor="middle" font-family="Manrope" font-size="24" data-font-size-pt="8.50" fill="#211A16">Увлажнение</text>
    </g>
    <g data-encoding="shape+label" data-meaning="формирование кучи и наблюдение" data-shape="mound">
      <path d="M256 950 Q304 854 352 950 Z" fill="#B88A58" stroke="#211A16" stroke-width="2" data-stroke-width-mm="0.25"/>
      <text x="304" y="990" text-anchor="middle" font-family="Manrope" font-size="24" data-font-size-pt="8.50" fill="#211A16">Куча</text>
    </g>
    <g data-encoding="shape+label" data-meaning="переворот как человеческое вмешательство" data-shape="crossing-arrows">
      <path d="M406 908 H510 L488 888 M510 908 L488 928 M510 950 H406 L428 930 M406 950 L428 970" fill="none" stroke="#253C32" stroke-width="4" data-stroke-width-mm="0.50"/>
      <text x="458" y="1008" text-anchor="middle" font-family="Manrope" font-size="24" data-font-size-pt="8.50" fill="#211A16">Переворот</text>
    </g>
    <g data-encoding="shape+label" data-meaning="повторное наблюдение после вмешательства" data-shape="eye">
      <path d="M548 920 Q602 872 656 920 Q602 968 548 920 Z" fill="none" stroke="#91432D" stroke-width="4" data-stroke-width-mm="0.50"/>
      <circle cx="602" cy="920" r="18" fill="#91432D" stroke="#211A16" stroke-width="2" data-stroke-width-mm="0.25"/>
      <text x="602" y="1008" text-anchor="middle" font-family="Manrope" font-size="24" data-font-size-pt="8.50" fill="#211A16">Наблюдение</text>
    </g>
    <g data-encoding="shape+label" data-meaning="сушка завершает влажное кучевание" data-shape="sun-over-line">
      <circle cx="744" cy="906" r="34" fill="#B88A58" stroke="#211A16" stroke-width="2" data-stroke-width-mm="0.25"/>
      <line x1="698" y1="958" x2="790" y2="958" stroke="#253C32" stroke-width="4" data-stroke-width-mm="0.50"/>
      <text x="744" y="1008" text-anchor="middle" font-family="Manrope" font-size="24" data-font-size-pt="8.50" fill="#211A16">Сушка</text>
    </g>
  </g>

  <g id="uncertainty">
    <rect x="820" y="272" width="322" height="746" rx="28" fill="#253C32"/>
    <text x="854" y="326" font-family="Cormorant" font-size="42" data-font-size-pt="14.88" fill="#E9DECA">Где измерять?</text>
    <text x="854" y="365" font-family="Manrope" font-size="24" data-font-size-pt="8.50" fill="#B88A58">[ГИПОТЕЗА]</text>
    <path d="M860 712 Q981 434 1102 712 Z" fill="#91432D" stroke="#E9DECA" stroke-width="3" data-stroke-width-mm="0.38"/>
    <g data-encoding="shape+label" data-meaning="гипотетическая проба края" data-shape="outlined-circle">
      <circle cx="892" cy="650" r="22" fill="#E9DECA" stroke="#211A16" stroke-width="3" data-stroke-width-mm="0.38"/>
      <text x="854" y="762" font-family="Manrope" font-size="24" data-font-size-pt="8.50" fill="#E9DECA">край</text>
    </g>
    <g data-encoding="shape+label" data-meaning="гипотетическая проба центра" data-shape="solid-circle">
      <circle cx="981" cy="538" r="22" fill="#B88A58" stroke="#211A16" stroke-width="3" data-stroke-width-mm="0.38"/>
      <text x="954" y="762" font-family="Manrope" font-size="24" data-font-size-pt="8.50" fill="#E9DECA">центр</text>
    </g>
    <g data-encoding="shape+label" data-meaning="гипотетическая проба основания" data-shape="square">
      <rect x="1052" y="666" width="44" height="44" fill="#E9DECA" stroke="#211A16" stroke-width="3" data-stroke-width-mm="0.38"/>
      <text x="1037" y="762" font-family="Manrope" font-size="24" data-font-size-pt="8.50" fill="#E9DECA">низ</text>
    </g>
    <path d="M892 650 L981 538 L1074 688" fill="none" stroke="#B88A58" stroke-width="3" data-stroke-width-mm="0.38" stroke-dasharray="10 10"/>
    <text x="981" y="824" text-anchor="middle" font-family="Literata" font-size="24" data-font-size-pt="8.50" textLength="236" lengthAdjust="spacingAndGlyphs" fill="#E9DECA">Тепло, влага и воздух</text>
    <text x="981" y="860" text-anchor="middle" font-family="Literata" font-size="24" data-font-size-pt="8.50" textLength="250" lengthAdjust="spacingAndGlyphs" fill="#E9DECA">могут различаться по зонам.</text>
    <text x="981" y="914" text-anchor="middle" font-family="Manrope" font-size="24" data-font-size-pt="8.50" textLength="250" lengthAdjust="spacingAndGlyphs" fill="#B88A58">Это не измеренная карта.</text>
    <text x="981" y="950" text-anchor="middle" font-family="Manrope" font-size="24" data-font-size-pt="8.50" textLength="224" lengthAdjust="spacingAndGlyphs" fill="#B88A58">Нужны локальные пробы.</text>
  </g>

  <g id="labels">
    <text x="74" y="140" font-family="Cormorant" font-size="56" data-font-size-pt="19.84" fill="#211A16">Wodui: тепло как событие</text>
    <text x="76" y="184" font-family="Literata" font-size="28" data-font-size-pt="9.92" fill="#91432D">Кривая включает среду, материал и работу людей</text>
    <text x="74" y="1090" font-family="Cormorant" font-size="42" data-font-size-pt="14.88" fill="#211A16">Что линия не сообщает</text>
    <text x="74" y="1134" font-family="Literata" font-size="26" data-font-size-pt="9.21" fill="#211A16">Она не назначает единственную причину тепла, точный срок</text>
    <text x="74" y="1172" font-family="Literata" font-size="26" data-font-size-pt="9.21" fill="#211A16">или одинаковую температуру каждой куче и каждой фабрике.</text>
  </g>

  <g id="legend">
    <line x1="74" y1="1248" x2="154" y2="1248" stroke="#91432D" stroke-width="8" data-stroke-width-mm="1.00"/>
    <text x="176" y="1257" font-family="Manrope" font-size="24" data-font-size-pt="8.50" fill="#211A16">условная траектория наблюдения</text>
    <line x1="624" y1="1248" x2="704" y2="1248" stroke="#B88A58" stroke-width="3" data-stroke-width-mm="0.38" stroke-dasharray="12 10"/>
    <text x="726" y="1257" font-family="Manrope" font-size="24" data-font-size-pt="8.50" fill="#211A16">неопределённость</text>
    <text x="74" y="1317" font-family="Manrope" font-size="24" data-font-size-pt="8.50" fill="#91432D">Значения и продолжительность условны и не универсальны.</text>
  </g>

  <g id="sources">
    <line x1="74" y1="1384" x2="1142" y2="1384" stroke="#B88A58" stroke-width="2" data-stroke-width-mm="0.25"/>
    <text x="74" y="1424" font-family="Manrope" font-size="24" data-font-size-pt="8.50" fill="#211A16">Опоры: Abe et al., 2008; DB5308/T 58—2020. Пространственные зоны — редакционная гипотеза.</text>
  </g>
</svg>

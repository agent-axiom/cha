<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" data-asset-id="diagram-wodui-heat" data-asset-class="diagram" data-visual-mode="explanatory-diagram" data-min-placement-width-mm="150" data-min-placement-height-mm="187.5" data-min-font-size-pt="7.5" data-min-stroke-width-mm="0.2" role="img" aria-labelledby="wodui-title wodui-desc">
  <title id="wodui-title">Wodui: тепло, действия и неопределённость</title>
  <desc id="wodui-desc">Условная стадийная температурная траектория влажной кучи и гипотетическая схема пространственного отбора, ясно отделённая от измеренной универсальной карты процесса.</desc>
  <rect x="0" y="0" width="1200" height="1500" fill="#E9DECA"/>
  <rect x="0" y="0" width="34" height="1500" fill="#91432D"/>
  <rect x="58" y="74" width="1084" height="2" fill="#B88A58"/>

  <g id="axes">
    <line x1="132" y1="788" x2="760" y2="788" stroke="#211A16" stroke-width="4" data-stroke-width-mm="0.50"/>
    <line x1="132" y1="788" x2="132" y2="306" stroke="#211A16" stroke-width="4" data-stroke-width-mm="0.50"/>
    <line x1="125" y1="664" x2="146" y2="664" stroke="#211A16" stroke-width="2" data-stroke-width-mm="0.25"/>
    <line x1="125" y1="540" x2="146" y2="540" stroke="#211A16" stroke-width="2" data-stroke-width-mm="0.25"/>
    <line x1="125" y1="416" x2="146" y2="416" stroke="#211A16" stroke-width="2" data-stroke-width-mm="0.25"/>
    <text x="94" y="560" transform="rotate(-90 94 560)" text-anchor="middle" font-family="Manrope" font-size="24" data-font-size-pt="8.50" fill="#211A16">Температура, °C · направление изменения</text>
    <text x="446" y="856" text-anchor="middle" font-family="Manrope" font-size="24" data-font-size-pt="8.50" fill="#211A16">Стадии процесса, не универсальные дни</text>
  </g>


  <title id="mountains-title">Шесть исторических чайных гор</title>
  <desc id="mountains-desc">Предварительная редакционная локализация шести исторических чайных областей к востоку от Ланьцанцзяна: штрихованные области и приблизительные центроиды, а не снятые на местности вершины или точные участки садов.</desc>
